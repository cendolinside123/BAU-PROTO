

<div ng-controller="HomeController">
    <title>{{ message }}</title>
    <h2>{{ message }}</h2>
    <div class="row">
        <div class="col-md-4 col-md-offset-4">
            <div class="login-panel panel panel-default">
                <div class="panel-body" ng-controller="AddEditProductController">
                    <form>
                        <fieldset>
                            <div class="form-group">
                                <input class="form-control" type="text" placeholder="Nama produk" name="nama" type="text" autofocus ng-model="product.nama">
                            </div>
                            <div class="form-group">
                                <textarea class="form-control" rows="4" cols="50" placeholder="Deskripsi produk" name="desc" type="text" autofocus ng-model="product.desc"></textarea>
                            </div>
                            <div class="form-group">
                                <input class="form-control" type="text" placeholder="Harga" name="harga" type="number" autofocus ng-model="product.harga">
                            </div>
                            <div class="form-group">
                                <label style="color: black;" ng-show="loadingStatus">
                                    Loading...
                                </label>
                            </div>
                            <div class="form-group">
                                <label style="color: red;">
                                    {{ errorMessage }}
                                </label>
                            </div>
                            <div class="form-group">
                                <button type="submit" class="btn btn-lg btn-success btn-block" ng-click="addEditProduct()" ng-disabled="loadingStatus">Add Product</button>
                            </div>
                        </fieldset>
                    </form>

                </div>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="row">
            <div class="col-md-5 col-md-offset-1">
                <input class="form-control" type="text" placeholder="Search Box" name="nama" type="text" autofocus ng-model="product.nama">
            </div>
        </div>
        <br />
        <div class="row">
            <div class="col-md-10 col-md-offset-1">
                <table class="table table-bordered">
                    <tr>
                        <th>Nama produk</th>
                        <th>Deskripsi produk</th>
                        <th>Harga</th>
                        <th>Created Date</th>
                        <th>Update Date</th>
                        <th style="width:100px">        </th>
                    </tr>
                    <tr> <td colspan="6" style="text-align:center;">data empty</td></tr>
                    <!--<tr ng-repeat="product in products">
                    <td>{{ product.nama }}</td>
                    <td>{{ product.desc }}</td>
                    <td>{{ product.harga }}</td>
                    <td>{{ product.createdDate | date:'medium' }}</td>
                    <td>{{ product.updatedDate | date:'medium' }}</td>
                </tr>-->
                </table>
            </div>
        </div>
        <br />
        <div class="row">
            <div class="col-md-1 col-md-offset-2">
                <button>Prev</button>
            </div>
            <div class="col-md-1 col-md-offset-6">
                <button>Next</button>
            </div>
        </div>

    </div>
    
</div>
