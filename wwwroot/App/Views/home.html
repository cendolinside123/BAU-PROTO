

<div ng-controller="HomeController">
    <title>{{ message }}</title>
    <h2>{{ message }}</h2>
    <div class="row">
        <div class="col-md-4 col-md-offset-4">
            <div class="login-panel panel panel-default">
                <div class="panel-body">
                    <form>
                        <fieldset>
                            <div class="form-group">
                                <input class="form-control" type="text" placeholder="Nama produk" name="nama" type="text" autofocus ng-model="product.nama">
                            </div>
                            <div class="form-group">
                                <textarea class="form-control" rows="4" cols="50" placeholder="Deskripsi produk" name="desc" type="text" autofocus ng-model="product.desc"></textarea>
                            </div>
                            <div class="form-group">
                                <input class="form-control" type="text" placeholder="Harga" name="harga" type="text" autofocus ng-model="product.harga">
                            </div>
                            <label style="color: red;">
                                {{ errorMessage }}
                            </label>
                            <button type="submit" class="btn btn-lg btn-success btn-block" ng-click="register()">Add Product</button>
                        </fieldset>
                    </form>

                </div>
            </div>
        </div>
    </div>
    
    <table border="1">
        <tr>
            <th>Nama produk</th>
            <th>Deskripsi produk</th>
            <th>Harga</th>
            <th>Created Date</th>
            <th>Update Date</th>
        </tr>
    </table>
</div>
